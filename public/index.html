<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Task List</title>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-dark border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold text-light" href="#">Task List App</a>
    </div>
</nav>
<main class="container py-4">
    <div class="app">
        <h1>Task Manager</h1>
        <div class="row mb-3 justify-content-center">
            <div class="col-8"><input class="form-control mb-3" type="text" id="task-input" placeholder="New task..."></div>
            <div class="col-4"><button class="btn btn-outline-primary" id="add-btn">Add Task</button></div>
        </div>
        <ul class="list-group" id="task-list"></ul>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
